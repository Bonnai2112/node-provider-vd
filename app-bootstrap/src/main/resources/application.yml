spring:
  application:
    name: node-provider
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:nodeprovider}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

app:
  platform:
    eth-docker:
      root-dir: ${PLATFORM_ROOT:/var/lib/platform/nodes}
      cache-dir: ${PLATFORM_CACHE:/var/lib/platform/cache}
      sha-cache-file: ${PLATFORM_SHA_CACHE:/var/lib/platform/cache/eth-docker-sha}
      templates-dir: ${PLATFORM_TEMPLATES:/var/lib/platform/templates}
      public-host: ${PLATFORM_PUBLIC_HOST:163.172.232.194}

logging:
  level:
    com.ceticgroup.cloud.nodeprovider: INFO
